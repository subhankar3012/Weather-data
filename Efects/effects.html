<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Weather Backgrounds</title>
    <link rel="stylesheet" href="effects.css">
</head>
<body>
    <div class="controls">
        <button onclick="setWeather('rain')">Rain</button>
        <button onclick="setWeather('snow')">Snow</button>
        <button onclick="setWeather('clouds')">Clouds</button>
        <button onclick="setWeather('lightning')">Lightning</button>
    </div>
    <canvas id="weather-canvas"></canvas>
    <script src="effects.js"></script>
</body>
</html>
